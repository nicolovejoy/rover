<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" font-family="ui-sans-serif, system-ui, sans-serif">
  <!-- Background -->
  <rect width="720" height="640" fill="#fafaf7"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">Rover v1 — top-down view (floor only)</text>
  <text x="360" y="52" text-anchor="middle" font-size="12" fill="#666">approx. 100 × 80 mm chassis · scale 1mm = 4px</text>

  <!-- Direction arrow -->
  <g transform="translate(630, 380)">
    <path d="M 0,-30 L 0,30 M -8,-22 L 0,-30 L 8,-22" stroke="#1a1a1a" stroke-width="2" fill="none"/>
    <text x="14" y="4" font-size="12" fill="#1a1a1a">forward</text>
  </g>

  <!-- Chassis (centered: x 110-510, y 200-520, so 400x320 = 100mm x 80mm) -->
  <rect x="110" y="200" width="400" height="320" fill="#f0ebe0" stroke="#8b7355" stroke-width="2" rx="8"/>

  <!-- Left wheel (top of view) - sticks out top of chassis -->
  <rect x="280" y="168" width="120" height="32" fill="#2a2a2a" stroke="#000" stroke-width="1.5" rx="4"/>
  <text x="340" y="160" text-anchor="middle" font-size="11" fill="#1a1a1a">wheel · 30mm dia</text>

  <!-- Right wheel (bottom of view) -->
  <rect x="280" y="520" width="120" height="32" fill="#2a2a2a" stroke="#000" stroke-width="1.5" rx="4"/>
  <text x="340" y="572" text-anchor="middle" font-size="11" fill="#1a1a1a">wheel · 30mm dia</text>

  <!-- Top motor (inside chassis, attached to top wheel) -->
  <rect x="296" y="200" width="48" height="96" fill="#b0a890" stroke="#5a5a5a" stroke-width="1.5" rx="3"/>
  <text x="320" y="252" text-anchor="middle" font-size="11" fill="#1a1a1a">motor</text>
  <text x="320" y="266" text-anchor="middle" font-size="10" fill="#555">N20 gear</text>
  <text x="320" y="280" text-anchor="middle" font-size="10" fill="#555">12×24mm</text>

  <!-- Bottom motor -->
  <rect x="296" y="424" width="48" height="96" fill="#b0a890" stroke="#5a5a5a" stroke-width="1.5" rx="3"/>
  <text x="320" y="470" text-anchor="middle" font-size="11" fill="#1a1a1a">motor</text>
  <text x="320" y="484" text-anchor="middle" font-size="10" fill="#555">N20 gear</text>
  <text x="320" y="498" text-anchor="middle" font-size="10" fill="#555">12×24mm</text>

  <!-- Caster (front) -->
  <circle cx="475" cy="360" r="18" fill="#d4d4d4" stroke="#5a5a5a" stroke-width="1.5"/>
  <text x="475" y="364" text-anchor="middle" font-size="10" fill="#1a1a1a">caster</text>
  <text x="475" y="395" text-anchor="middle" font-size="10" fill="#555">passive ball</text>

  <!-- ESP32 -->
  <rect x="146" y="306" width="120" height="60" fill="#1e3a5f" stroke="#0a1f3d" stroke-width="1.5" rx="3"/>
  <text x="206" y="332" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">ESP32</text>
  <text x="206" y="350" text-anchor="middle" font-size="10" fill="#cfd8e3">brain · 50×25mm</text>

  <!-- Motor driver -->
  <rect x="356" y="332" width="60" height="36" fill="#5a3a2a" stroke="#2a1810" stroke-width="1.5" rx="3"/>
  <text x="386" y="350" text-anchor="middle" font-size="10" fill="#fff" font-weight="600">DRV8833</text>
  <text x="386" y="362" text-anchor="middle" font-size="9" fill="#e8d5c0">15×20mm</text>

  <!-- Battery -->
  <rect x="146" y="406" width="140" height="80" fill="#7a8c5e" stroke="#3a4a28" stroke-width="1.5" rx="4"/>
  <text x="216" y="438" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">1S LiPo</text>
  <text x="216" y="454" text-anchor="middle" font-size="10" fill="#e8efdd">500-1000 mAh</text>
  <text x="216" y="470" text-anchor="middle" font-size="10" fill="#e8efdd">35×20×6 mm</text>

  <!-- Wiring: power (red = +, black = -) -->
  <!-- Battery to ESP32 -->
  <path d="M 280 425 L 290 425 L 290 320 L 270 320 L 270 320" stroke="#c92a2a" stroke-width="2.5" fill="none"/>
  <path d="M 280 440 L 296 440 L 296 358 L 270 358" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>

  <!-- Battery to driver -->
  <path d="M 285 470 L 376 470 L 376 368" stroke="#c92a2a" stroke-width="2.5" fill="none"/>

  <!-- Driver to motors (power-ish, motor outputs) -->
  <path d="M 386 332 L 386 280 L 344 280" stroke="#c92a2a" stroke-width="2" fill="none"/>
  <path d="M 396 332 L 396 290 L 344 290" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  <path d="M 386 368 L 386 440 L 344 440" stroke="#c92a2a" stroke-width="2" fill="none"/>
  <path d="M 396 368 L 396 450 L 344 450" stroke="#1a1a1a" stroke-width="2" fill="none"/>

  <!-- Signal: ESP32 to driver -->
  <path d="M 266 340 L 320 340 L 320 348 L 356 348" stroke="#0891b2" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <path d="M 266 350 L 326 350 L 326 358 L 356 358" stroke="#0891b2" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <g transform="translate(540, 200)">
    <rect x="0" y="0" width="160" height="160" fill="#fff" stroke="#aaa" stroke-width="1" rx="4"/>
    <text x="80" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">legend</text>

    <line x1="12" y1="42" x2="32" y2="42" stroke="#c92a2a" stroke-width="2.5"/>
    <text x="40" y="46" font-size="11" fill="#1a1a1a">power +  (red)</text>

    <line x1="12" y1="62" x2="32" y2="62" stroke="#1a1a1a" stroke-width="2.5"/>
    <text x="40" y="66" font-size="11" fill="#1a1a1a">power −  (black)</text>

    <line x1="12" y1="82" x2="32" y2="82" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="40" y="86" font-size="11" fill="#1a1a1a">signal (control)</text>

    <text x="12" y="112" font-size="10" fill="#555">power = big current</text>
    <text x="12" y="126" font-size="10" fill="#555">signal = tiny voltage</text>
    <text x="12" y="140" font-size="10" fill="#555">brain → driver → motor</text>
  </g>

  <!-- Dimension callouts -->
  <!-- Width -->
  <g stroke="#888" stroke-width="1" fill="none">
    <line x1="110" y1="600" x2="510" y2="600"/>
    <line x1="110" y1="595" x2="110" y2="605"/>
    <line x1="510" y1="595" x2="510" y2="605"/>
  </g>
  <text x="310" y="618" text-anchor="middle" font-size="11" fill="#555">100 mm (length, front-to-back)</text>

  <!-- Height -->
  <g stroke="#888" stroke-width="1" fill="none">
    <line x1="80" y1="200" x2="80" y2="520"/>
    <line x1="75" y1="200" x2="85" y2="200"/>
    <line x1="75" y1="520" x2="85" y2="520"/>
  </g>
  <text x="68" y="364" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90 68 364)">80 mm (width)</text>

  <!-- Footer note -->
  <text x="360" y="620" text-anchor="middle" font-size="10" fill="#888">target weight: 200-300g · runtime: 20-40 min · phase 1 of 3</text>
</svg>
